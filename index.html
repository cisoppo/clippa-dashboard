<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clippa · Dashboard 2026</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f1f5f9; color: #1e293b; min-height: 100vh; display: flex; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 220px; min-height: 100vh; background: #0f172a;
      display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; bottom: 0; z-index: 200;
    }
    .sidebar-logo {
      padding: 24px 20px 20px;
      border-bottom: 1px solid #1e293b;
    }
    .logo-text { font-size: 28px; font-weight: 900; letter-spacing: -1px; color: #f97316; display: block; }
    .logo-sub  { font-size: 10px; color: #475569; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px; display: block; }

    .sidebar-section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; color: #334155;
      padding: 20px 20px 8px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 11px 20px;
      background: transparent; border: none;
      color: #94a3b8; font-size: 13px; font-weight: 600;
      cursor: pointer; text-align: left;
      transition: all .15s; border-left: 3px solid transparent;
    }
    .nav-item:hover { background: #1e293b; color: #e2e8f0; border-left-color: #334155; }
    .nav-item.active { background: #1e293b; color: #f97316; border-left-color: #f97316; }
    .nav-item .nav-icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }

    .sidebar-footer {
      margin-top: auto; padding: 16px 20px;
      border-top: 1px solid #1e293b;
      display: flex; flex-direction: column; gap: 8px;
    }
    #header-date { font-size: 11px; color: #475569; line-height: 1.4; }
    .btn-refresh {
      background: #1e293b; border: 1px solid #f97316;
      color: #f97316; padding: 7px 14px; border-radius: 8px;
      cursor: pointer; font-size: 12px; font-weight: 600;
      transition: all .15s; width: 100%;
    }
    .btn-refresh:hover { background: #f97316; color: #fff; }

    /* ── SIDEBAR TOGGLE ── */
    .sidebar { transition: width .25s ease, transform .25s ease; overflow: hidden; }

    /* Botão de toggle dentro da sidebar (desktop) */
    .sidebar-toggle-inner {
      display: flex; justify-content: flex-end; padding: 10px 12px 0;
    }
    .sidebar-toggle-inner-btn {
      background: #1e293b; border: none; color: #94a3b8;
      width: 28px; height: 28px; border-radius: 7px;
      font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .sidebar-toggle-inner-btn:hover { background: #f97316; color: #fff; }

    /* Sidebar colapsada (desktop) */
    .sidebar.collapsed { width: 60px; }
    .sidebar.collapsed .logo-sub,
    .sidebar.collapsed .sidebar-section-label,
    .sidebar.collapsed .nav-label,
    .sidebar.collapsed #header-date,
    .sidebar.collapsed .btn-refresh { display: none; }
    .sidebar.collapsed .logo-text { font-size: 18px; }
    .sidebar.collapsed .nav-item { padding: 12px 0; justify-content: center; border-left: none; }
    .sidebar.collapsed .nav-item.active { background: #1e293b; border-left: none; }
    .sidebar.collapsed .nav-item .nav-icon { font-size: 20px; width: auto; }
    .sidebar.collapsed .sidebar-logo { padding: 20px 0; text-align: center; }
    .sidebar.collapsed .sidebar-toggle-inner { justify-content: center; padding: 10px 0 0; }
    .sidebar.collapsed .sidebar-footer { padding: 12px 0; align-items: center; }
    .content-area { margin-left: 220px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; transition: margin-left .25s ease; }
    .content-area.expanded { margin-left: 60px; }

    /* Botão flutuante (mobile) */
    .sidebar-toggle-btn {
      display: none; position: fixed; top: 14px; left: 14px; z-index: 300;
      background: #0f172a; border: 2px solid #f97316; color: #f97316;
      width: 40px; height: 40px; border-radius: 10px;
      font-size: 18px; cursor: pointer; align-items: center; justify-content: center;
    }
    .sidebar-close-btn {
      display: none; position: absolute; top: 14px; right: 14px;
      background: #1e293b; border: none; color: #94a3b8;
      width: 32px; height: 32px; border-radius: 8px;
      font-size: 18px; cursor: pointer; align-items: center; justify-content: center;
    }
    .overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
      z-index: 150; backdrop-filter: blur(2px);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      body { display: block; }
      .sidebar {
        transform: translateX(-100%);
        box-shadow: 4px 0 24px rgba(0,0,0,.5);
        width: 220px !important;
      }
      .sidebar.open { transform: translateX(0); }
      .sidebar.collapsed { width: 220px !important; }
      .sidebar-toggle-inner { display: none; }
      .sidebar-toggle-btn { display: flex; }
      .sidebar-close-btn { display: flex; }
      .overlay.open { display: block; }
      .content-area, .content-area.expanded { margin-left: 0; }
      .kpi-grid { grid-template-columns: repeat(2, 1fr) !important; }
      .grid-2, .grid-3 { grid-template-columns: 1fr !important; }
      main { padding: 60px 14px 20px; }
      .alerts-section .alert-bar { padding: 10px 14px; font-size: 12px; }
    }

    /* ── LOADING ── */
    #loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 16px; flex: 1; }
    .spinner { width: 44px; height: 44px; border: 3px solid #e2e8f0; border-top: 3px solid #f97316; border-radius: 50%; animation: spin .9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #main-content { display: none; flex: 1; flex-direction: column; }

    /* ── ALERTS ── */
    .alerts-section { display: flex; flex-direction: column; }
    .alert-bar { padding: 11px 28px; font-size: 13px; display: flex; align-items: center; gap: 10px; font-weight: 500; }
    .alert-bar.danger  { background: #fef2f2; border-left: 4px solid #ef4444; color: #991b1b; }
    .alert-bar.warning { background: #fff7ed; border-left: 4px solid #f97316; color: #9a3412; }
    .alert-bar.info    { background: #fff7ed; border-left: 4px solid #fbbf24; color: #92400e; }

    /* ── MAIN ── */
    main { flex: 1; padding: 24px 28px; }

    /* ── KPI GRID ── */
    .kpi-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 24px; }
    .kpi-card { background: #fff; border-radius: 14px; padding: 18px 20px; box-shadow: 0 1px 4px rgba(0,0,0,.07); border-top: 3px solid #f97316; transition: box-shadow .2s; }
    .kpi-card:hover { box-shadow: 0 4px 16px rgba(249,115,22,.15); }
    .kpi-card.green  { border-top-color: #22c55e; }
    .kpi-card.red    { border-top-color: #ef4444; }
    .kpi-card.amber  { border-top-color: #fbbf24; }
    .kpi-card.purple { border-top-color: #a855f7; }
    .kpi-label { font-size: 10px; text-transform: uppercase; letter-spacing: .8px; color: #94a3b8; font-weight: 700; margin-bottom: 6px; }
    .kpi-value { font-size: 22px; font-weight: 900; color: #0f172a; line-height: 1.1; }
    .kpi-sub   { font-size: 11px; color: #94a3b8; margin-top: 5px; }
    .kpi-chip  { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; margin-top: 6px; }
    .chip-up   { background: #dcfce7; color: #15803d; }
    .chip-down { background: #fee2e2; color: #b91c1c; }
    .chip-warn { background: #fff7ed; color: #c2410c; }
    .chip-gray { background: #f1f5f9; color: #475569; }
    .chip-orange { background: #fff7ed; color: #ea580c; }

    /* ── TAB PANES ── */
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* ── CARDS ── */
    .card { background: #fff; border-radius: 14px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.07); margin-bottom: 16px; }
    .card-title { font-size: 14px; font-weight: 700; color: #0f172a; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
    .card-title-left { display: flex; align-items: center; gap: 8px; }
    .card-sub { font-size: 12px; color: #94a3b8; }

    /* ── GRIDS ── */
    .grid-2   { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3   { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .grid-3-1 { display: grid; grid-template-columns: 3fr 1fr; gap: 16px; }

    /* ── TABLES ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th { background: #f8fafc; padding: 10px 12px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: #64748b; font-weight: 700; border-bottom: 2px solid #e2e8f0; white-space: nowrap; }
    thead th.text-right { text-align: right; }
    thead th.text-center { text-align: center; }
    tbody td { padding: 11px 12px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #fffbf7; }
    .total-row td { background: #f8fafc !important; font-weight: 800; border-top: 2px solid #e2e8f0; }
    .text-right  { text-align: right; }
    .text-center { text-align: center; }
    .fw-bold  { font-weight: 700; }
    .font-mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; }

    /* ── BADGES ── */
    .badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; gap: 4px; }
    .badge-assinado  { background: #dcfce7; color: #15803d; }
    .badge-enviado   { background: #fff7ed; color: #c2410c; }
    .badge-aguardando { background: #f1f5f9; color: #475569; }
    .badge-vencido   { background: #fee2e2; color: #b91c1c; }
    .badge-ok        { background: #dcfce7; color: #15803d; }
    .badge-baixo     { background: #fff7ed; color: #c2410c; }
    .badge-critico   { background: #fee2e2; color: #b91c1c; }

    /* ── TAGS ── */
    .tag { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; margin: 1px; white-space: nowrap; }
    .tag-padel   { background: #dbeafe; color: #1e40af; }
    .tag-areia   { background: #fff7ed; color: #c2410c; }
    .tag-society { background: #dcfce7; color: #15803d; }

    /* ── PAYMENT CELLS ── */
    .pay-cell { border-radius: 5px; padding: 3px 7px; font-size: 12px; font-weight: 700; display: block; text-align: center; white-space: nowrap; }
    .pay-pago     { background: #dcfce7; color: #15803d; }
    .pay-enviado  { background: #fff7ed; color: #c2410c; font-size: 11px; }
    .pay-pendente { background: #fee2e2; color: #b91c1c; font-size: 11px; }
    .pay-projetado { background: #f3f4f6; color: #6b7280; font-size: 11px; }
    .pay-vazio    { color: #d1d5db; font-size: 12px; text-align: center; display: block; }

    /* ── RENEWAL ITEMS ── */
    .renewal-list { display: flex; flex-direction: column; gap: 8px; }
    .renewal-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 12px; border: 1px solid #e2e8f0; }
    .renewal-item.expired { border-color: #fecaca; background: #fff5f5; }
    .renewal-item.urgent  { border-color: #fed7aa; background: #fffaf5; }
    .renewal-item.watch   { border-color: #fde68a; background: #fffef0; }
    .renewal-item.ok      { border-color: #bbf7d0; background: #f0fdf4; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot-red    { background: #ef4444; }
    .dot-orange { background: #f97316; }
    .dot-yellow { background: #eab308; }
    .dot-green  { background: #22c55e; }
    .renewal-info { flex: 1; min-width: 0; }
    .renewal-clube { font-weight: 700; font-size: 14px; }
    .renewal-meta  { font-size: 11px; color: #64748b; margin-top: 2px; }

    /* ── OBS BOXES ── */
    .obs-list { display: flex; flex-direction: column; gap: 8px; }
    .obs { border-left: 3px solid #f97316; background: #fff7ed; padding: 10px 14px; border-radius: 0 8px 8px 0; font-size: 13px; color: #9a3412; }
    .obs.danger { border-color: #ef4444; background: #fef2f2; color: #991b1b; }
    .obs.green  { border-color: #22c55e; background: #f0fdf4; color: #15803d; }
    .obs.gray   { border-color: #94a3b8; background: #f8fafc; color: #475569; }
    .obs strong { font-weight: 700; }

    /* ── CHART ── */
    .chart-container { position: relative; }

    /* ── STATE PILLS ── */
    .state-pill { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
    .state-PR { background: #dbeafe; color: #1e40af; }
    .state-SC { background: #dcfce7; color: #15803d; }
    .state-RS { background: #f3e8ff; color: #7e22ce; }

    /* ── ANOMALY ── */
    tr.anomaly    td { background: #fff7ed !important; }
    tr.expired-row td { background: #fef2f2 !important; }

    /* ── PIPELINE ── */
    .pipeline-grid { display: flex; flex-direction: column; gap: 16px; }
    .pipeline-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 18px 22px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
    .pipeline-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .pipeline-card-name { font-size: 15px; font-weight: 700; color: #0f172a; }
    .pipeline-badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
    .pipeline-badge.done    { background: #dcfce7; color: #15803d; }
    .pipeline-badge.ongoing { background: #fff7ed; color: #c2410c; }
    .pipeline-steps { display: flex; align-items: flex-start; gap: 0; width: 100%; }
    .pipeline-step { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
    .pipeline-step:not(:last-child)::after { content: ''; position: absolute; top: 13px; left: 50%; width: 100%; height: 2px; background: #e2e8f0; z-index: 0; }
    .pipeline-step:not(:last-child).step-done::after { background: #22c55e; }
    .pipeline-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; z-index: 1; flex-shrink: 0; border: 2px solid #e2e8f0; background: #f8fafc; }
    .pipeline-dot.done    { background: #22c55e; border-color: #22c55e; color: #fff; }
    .pipeline-dot.current { background: #f97316; border-color: #f97316; color: #fff; animation: pulse-dot .9s infinite alternate; }
    .pipeline-dot.pending { background: #f8fafc; border-color: #cbd5e1; color: #94a3b8; }
    @keyframes pulse-dot { from { box-shadow: 0 0 0 0 rgba(249,115,22,.4); } to { box-shadow: 0 0 0 6px rgba(249,115,22,0); } }
    .pipeline-label { font-size: 10px; color: #64748b; text-align: center; margin-top: 6px; line-height: 1.3; font-weight: 500; max-width: 72px; }
    .pipeline-label.done    { color: #15803d; font-weight: 700; }
    .pipeline-label.current { color: #c2410c; font-weight: 700; }
    @media (max-width: 600px) {
      .pipeline-steps { flex-direction: column; gap: 10px; }
      .pipeline-step::after { display: none; }
      .pipeline-step { flex-direction: row; align-items: center; gap: 10px; }
      .pipeline-label { text-align: left; max-width: none; margin-top: 0; }
    }

    /* ── SECTION DIVIDER ── */
    .section-title { font-size: 13px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .8px; margin: 20px 0 12px; display: flex; align-items: center; gap: 8px; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: #e2e8f0; }

    /* ── PROGRESS BAR ── */
    .prog-bar { background: #f1f5f9; border-radius: 6px; height: 8px; overflow: hidden; }
    .prog-fill { height: 100%; border-radius: 6px; background: #f97316; transition: width .4s; }
    .prog-fill.green { background: #22c55e; }
    .prog-fill.red   { background: #ef4444; }
  </style>
</head>
<body>

<!-- Overlay (mobile) -->
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- Toggle button (mobile) -->
<button class="sidebar-toggle-btn" onclick="toggleSidebar()">☰</button>

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar">
  <button class="sidebar-close-btn" onclick="closeSidebar()">✕</button>
  <div class="sidebar-logo">
    <span class="logo-text">CLIPPA</span>
    <span class="logo-sub">Dashboard 2026</span>
  </div>

  <div class="sidebar-toggle-inner">
    <button class="sidebar-toggle-inner-btn" onclick="toggleSidebarDesktop()" title="Recolher menu">‹</button>

  <div class="sidebar-section-label">MENU</div>

  <button class="nav-item active" onclick="switchTab('visao-geral')">

  <button class="nav-item" onclick="switchTab('contratos')">
    <span class="nav-icon">📋</span><span class="nav-label"> Contratos</span>
  </button>
  <button class="nav-item" onclick="switchTab('recebimentos')">
    <span class="nav-icon">💰</span><span class="nav-label"> Recebimentos</span>
  </button>
  <button class="nav-item" onclick="switchTab('renovacoes')">
    <span class="nav-icon">🔄</span><span class="nav-label"> Renovações</span>
  </button>
  <button class="nav-item" onclick="switchTab('projecao')">
    <span class="nav-icon">📈</span><span class="nav-label"> Projeção MRR</span>
  </button>
  <button class="nav-item" onclick="switchTab('estoque')">
    <span class="nav-icon">📦</span><span class="nav-label"> Estoque</span>
  </button>
  <button class="nav-item" onclick="switchTab('implantacao')">

</nav>

<!-- CONTENT -->
<div class="content-area">

  <div id="loading">
    <div class="spinner"></div>
    <div style="color:#64748b;font-size:14px;font-weight:600">Carregando dados da planilha...</div>
  </div>

  <div id="main-content" style="display:none">
    <div class="alerts-section" id="alerts-section"></div>
    <main>
      <div class="kpi-grid" id="kpi-grid"></div>
      <div id="visao-geral"  class="tab-pane active"></div>
      <div id="contratos"    class="tab-pane"></div>
      <div id="recebimentos" class="tab-pane"></div>
      <div id="renovacoes"   class="tab-pane"></div>
      <div id="projecao"     class="tab-pane"></div>
      <div id="estoque"      class="tab-pane"></div>
      <div id="implantacao"  class="tab-pane"></div>
      <div id="cliente-produto" class="tab-pane"></div>
      <div id="pipeline"        class="tab-pane"></div>
    </main>
  </div>

</div>

<script>
// ═══════════════════════════════════════════
// CONFIGURAÇÃO
// ═══════════════════════════════════════════
const SHEET_ID         = '1HugA1FjzNBMlKNpr-j9pyqk_94rLSfkRIvQKQ1lTkrA';
const GID_CONTRATOS    = '1516194585';
const GID_RECEBIMENTOS = '1616219438';
const GID_ESTOQUE      = '23632109';
const GID_IMPL_PARCELAS = '537145439';
const GID_IMPL_RESUMO   = '900572378';
const GID_CLIENTE_PRODUTO = '34736782';
const GID_PIPELINE        = '1139371171';

// ═══════════════════════════════════════════
// ESTADO GLOBAL
// ═══════════════════════════════════════════
const TODAY = new Date();
let contratos = [], PAG = {}, estoque = [], implParcelas = [], implResumo = [], clienteProduto = [], pipeline = [];

const MESES_KEYS  = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const MESES_LABEL = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const MESES_NOMES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

// ═══════════════════════════════════════════
// CSV UTILITIES
// ═══════════════════════════════════════════
function parseCSVLine(line) {
  const result = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    if (line[i] === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
    else if (line[i] === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
    else cur += line[i];
  }
  result.push(cur.trim()); return result;
}

function parseCSV(text) {
  text = text.replace(/^\uFEFF/, '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const lines = text.trim().split('\n').filter(l => l.trim());
  let headerIdx = 0;
  for (let i = 0; i < lines.length; i++) {
    if (parseCSVLine(lines[i]).some(v => v.trim())) { headerIdx = i; break; }
  }
  const headers = parseCSVLine(lines[headerIdx]).map((h, i) => {
    h = h.trim().replace(/^\uFEFF/, '');
    return h || (i === 0 ? 'Status' : `_col${i}`);
  });
  return lines.slice(headerIdx + 1).map(line => {
    const vals = parseCSVLine(line);
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || '').trim());
    return obj;
  });
}

function parseMoney(s) {
  if (!s) return 0;
  return parseFloat(s.replace(/R\$\s*/g, '').replace(/,/g, '').trim()) || 0;
}

function parseDateBR(s) {
  if (!s) return '';
  const p = s.trim().split('/');
  if (p.length === 3) return `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
  return s.trim();
}

// ═══════════════════════════════════════════
// FUZZY MATCHING
// ═══════════════════════════════════════════
function normStr(s) {
  return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');
}
function levenshtein(a, b) {
  const m=a.length,n=b.length,dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i||j));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++) dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}
function findContract(csvName, list) {
  const nc=normStr(csvName);
  let f=list.find(c=>normStr(c.clube)===nc); if(f) return f;
  f=list.find(c=>{const cn=normStr(c.clube);return cn.includes(nc)||nc.includes(cn);}); if(f) return f;
  const sc=list.map(c=>({c,d:levenshtein(normStr(c.clube),nc)})).sort((a,b)=>a.d-b.d);
  return (sc[0]&&sc[0].d<=3)?sc[0].c:null;
}

function buildContratosFromCSV(rows) {
  return rows.filter(r=>r['Clube']&&normStr(r['Clube'])!=='total').map((row,i)=>{
    const esportesRaw=row['Esportes']||'';
    const esportes=esportesRaw.split(/[,/]/).map(e=>{
      e=e.trim(); const el=e.toLowerCase();
      if(el.includes('areia')||el.includes('beach')) return 'Esportes de areia';
      if(el.includes('padel')) return 'Padel';
      if(el.includes('society')||el.includes('futebol')) return 'Society';
      return e||null;
    }).filter(Boolean);
    const s=(row['Status']||'').toLowerCase();
    let status='Esperando dados';
    if(s.includes('assinado')) status='Contrato assinado';
    else if(s.includes('enviado')) status='Contrato enviado';
    return {
      id:i+1, clube:row['Clube'],
      mrr:parseMoney(row['Valor mensal']),
      valorCam:parseMoney(row['Valor por câmera']),
      cameras:parseInt(row['Nº câmeras'])||1,
      cidade:row['Cidade'], estado:row['Estado'], pais:row['País']||row['Pais']||'Brasil', status,
      inicio:parseDateBR(row['Início do contrato']),
      fim:parseDateBR(row['Fim do contrato']),
      contato:row['Nome cliente'], tel:row['Contato'],
      esportes:esportes.length?esportes:['—'],
      meses:parseInt(row['Duração do contrato'])||12,
      solucao:row['Solução']||'',
    };
  });
}

function buildPAGFromCSV(rows, list) {
  const pag={}, curMes=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
  function getMonthValue(row,mesIdx) {
    const nome=MESES_NOMES[mesIdx];
    if(row[nome]!==undefined) return (row[nome]||'').trim();
    const normNome=normStr(nome);
    const key=Object.keys(row).find(k=>normStr(k)===normNome);
    return key?(row[key]||'').trim():'';
  }
  rows.forEach(row=>{
    const clubeCSV=row['Clube'];
    if(!clubeCSV||normStr(clubeCSV)==='total') return;
    const contrato=findContract(clubeCSV,list);
    const key=contrato?contrato.clube:clubeCSV;
    const inicioDate=contrato?parseDate(contrato.inicio):null;
    const fimDate=contrato?parseDate(contrato.fim):null;
    const mesValues={};
    MESES_NOMES.forEach((nome,mesIdx)=>{
      const cellValue=getMonthValue(row,mesIdx);
      const mesKey=MESES_KEYS[mesIdx];
      const mesDate=new Date(2026,mesIdx,1);
      const inContract=inicioDate&&fimDate
        ?mesDate>=new Date(inicioDate.getFullYear(),inicioDate.getMonth(),1)&&mesDate<=new Date(fimDate.getFullYear(),fimDate.getMonth(),1)
        :true;
      if(cellValue.startsWith('R$')) mesValues[mesKey]=parseMoney(cellValue);
      else if(cellValue.toLowerCase()==='enviado') mesValues[mesKey]='enviado';
      else if(!cellValue) {
        if(!inContract) mesValues[mesKey]=null;
        else if(mesDate<=curMes) mesValues[mesKey]='pendente';
        else mesValues[mesKey]=contrato?contrato.mrr:null;
      } else mesValues[mesKey]=null;
    });
    pag[key]=mesValues;
  });
  list.forEach(c=>{
    if(pag[c.clube]) return;
    const ini=parseDate(c.inicio),fim=parseDate(c.fim);
    const mv={};
    MESES_KEYS.forEach((k,mi)=>{
      const md=new Date(2026,mi,1);
      const inC=md>=new Date(ini.getFullYear(),ini.getMonth(),1)&&md<=new Date(fim.getFullYear(),fim.getMonth(),1);
      mv[k]=!inC?null:md<=curMes?'pendente':c.mrr;
    });
    pag[c.clube]=mv;
  });
  return pag;
}

function buildEstoqueFromCSV(rows) {
  return rows.filter(r=>r['Item']&&normStr(r['Item'])!=='total'&&normStr(r['Item'])!=='item').map(row=>({
    item:     row['Item'],
    categoria:row['Categoria']||'Outros',
    qtde:     parseInt(row['Qtde'])||0,
  }));
}

function buildImplParcelasFromRaw(text) {
  // Wide-format CSV: months as column groups (Clube, Valor, Parcela% per month)
  text = text.replace(/^\uFEFF/, '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const lines = text.split('\n').filter(l => l.trim());
  const MES_MAP = {
    'marco':'mar','março':'mar','abril':'abr','maio':'mai','junho':'jun',
    'julho':'jul','agosto':'ago','setembro':'set','outubro':'out',
    'novembro':'nov','dezembro':'dez'
  };
  const result = [];

  // Find row with month names
  let monthCols = {}, headerRow = -1;
  for (let i = 0; i < lines.length; i++) {
    const cols = parseCSVLine(lines[i]);
    const found = cols.some(c => MES_MAP[normStr(c)]);
    if (found) {
      headerRow = i;
      cols.forEach((c, ci) => { if (MES_MAP[normStr(c)]) monthCols[ci] = MES_MAP[normStr(c)]; });
      break;
    }
  }
  if (headerRow < 0) return result;

  // Data rows start 2 rows after header (skip the Clube/Valor/Parcela sub-header row)
  for (let i = headerRow + 2; i < lines.length; i++) {
    const cols = parseCSVLine(lines[i]);
    Object.entries(monthCols).forEach(([ci, mes]) => {
      const idx = parseInt(ci);
      // Strip any leaked "N/M " prefix from clube cell
      const clube = (cols[idx] || '').replace(/^\d+\/\d+\s+/, '').trim();
      const valor = parseMoney(cols[idx + 1] || '');
      const pct   = (cols[idx + 2] || '').trim();
      if (clube && valor > 0) result.push({ mes, clube, valor, parcela: pct });
    });
  }
  return result;
}

function buildImplResumoFromCSV(rows) {
  return rows.filter(r => {
    const clube = (r['Clube'] || Object.values(r)[0] || '').trim();
    return clube && normStr(clube) !== 'clube' && normStr(clube) !== 'total';
  }).map(row => {
    const vals = Object.values(row);
    return {
      clube:   (row['Clube']         || vals[0] || '').trim(),
      cobrado: parseMoney(row['Valor Cobrado'] || vals[1] || ''),
      gasto:   parseMoney(row['Valor Gasto']   || vals[2] || ''),
      roi:     parseMoney(row['ROI']            || vals[3] || ''),
    };
  }).filter(r => r.cobrado > 0 || r.gasto > 0);
}

// HELPERS
// ═══════════════════════════════════════════
function fmt(v){ if(v===null||v===undefined) return '—'; return 'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtK(v){ return v>=1000?'R$ '+(v/1000).toFixed(1).replace('.',',')+' k':fmt(v); }
function parseDate(s){ if(!s) return new Date(); const[y,m,d]=s.split('-'); return new Date(+y,+m-1,+d); }
function diffDays(a,b){ return Math.round((b-a)/(1000*60*60*24)); }

function getMRRStatus(c){
  const inicio=parseDate(c.inicio);
  if(inicio>TODAY) return 'futuro';
  const curKey=MESES_KEYS[TODAY.getMonth()];
  const pagAtual=PAG[c.clube]&&PAG[c.clube][curKey];
  const fim=parseDate(c.fim);
  if(fim<TODAY&&!pagAtual) return 'vencido';
  return 'ativo';
}

function esporteTags(esps){ return esps.map(e=>{let cls='tag-areia';if((e||'').includes('Padel'))cls='tag-padel';else if((e||'').includes('Society'))cls='tag-society';return`<span class="tag ${cls}">${e}</span>`;}).join(' '); }
function statusBadge(s){ if(s==='Contrato assinado')return`<span class="badge badge-assinado">✓ Assinado</span>`;if(s==='Contrato enviado')return`<span class="badge badge-enviado">→ Enviado</span>`;return`<span class="badge badge-aguardando">⏳ Aguardando</span>`; }
function getMRRStatusBadge(c){ const st=getMRRStatus(c);if(st==='vencido')return`<span class="badge badge-vencido">⚠ Vencido</span>`;if(st==='futuro')return`<span class="badge badge-aguardando">🕐 Futuro</span>`;return`<span class="badge badge-assinado">● Ativo</span>`; }

function calcMesMRR(k){ let t=0; contratos.forEach(c=>{const v=PAG[c.clube]&&PAG[c.clube][k];if(typeof v==='number')t+=v;}); return t; }
function calcMesEsperado(k){ let t=0; contratos.forEach(c=>{const v=PAG[c.clube]&&PAG[c.clube][k];if(v!==null&&v!==undefined)t+=(typeof v==='number'?v:c.mrr);}); return t; }

// KPIs
// ═══════════════════════════════════════════
function buildKPIs(){
  const curKey=MESES_KEYS[TODAY.getMonth()];
  const prevKey=MESES_KEYS[Math.max(TODAY.getMonth()-1,0)];
  const nextKey=MESES_KEYS[Math.min(TODAY.getMonth()+1,11)];
  const ativos=contratos.filter(c=>getMRRStatus(c)==='ativo');
  const futuros=contratos.filter(c=>getMRRStatus(c)==='futuro');
  const mrrAtual=calcMesEsperado(curKey);
  const mrrPrev=calcMesMRR(prevKey);
  const mrrProx=calcMesEsperado(nextKey);
  const activeCams=ativos.reduce((s,c)=>s+c.cameras,0);
  // Taxa de coleta: meses passados confirmados/esperados
  let totalConf=0, totalEsp=0;
  MESES_KEYS.slice(0,TODAY.getMonth()).forEach(k=>{ totalConf+=calcMesMRR(k); totalEsp+=calcMesEsperado(k); });
  const taxaColeta=totalEsp>0?Math.round((totalConf/totalEsp)*100):100;
  // Contratos vencendo em 60d
  const vencendo60=contratos.filter(c=>{ const d=diffDays(TODAY,parseDate(c.fim)); return d>=0&&d<=60; });
  const mrrRisco=vencendo60.reduce((s,c)=>s+c.mrr,0);

  const kpis=[
    { label:'MRR '+MESES_LABEL[TODAY.getMonth()], value:fmt(mrrAtual), sub:`${MESES_LABEL[Math.max(TODAY.getMonth()-1,0)]} confirmado: ${fmt(mrrPrev)}`, chip: mrrAtual>=mrrPrev?`↑ +${fmt(mrrAtual-mrrPrev)}`:`↓ ${fmt(mrrAtual-mrrPrev)}`, chipCls:mrrAtual>=mrrPrev?'chip-up':'chip-down' },
    { label:'MRR '+MESES_LABEL[Math.min(TODAY.getMonth()+1,11)]+' (proj.)', value:fmt(mrrProx), sub:'Baseado nos contratos vigentes', chip:`+${fmt(mrrProx-mrrAtual)} vs atual`, chipCls:mrrProx>=mrrAtual?'chip-up':'chip-down', cls:'green' },
    { label:'Clientes Ativos', value:ativos.length, sub:`de ${contratos.length} total · ${futuros.length} futuros`, chip:`${futuros.length} a entrar`, chipCls:'chip-gray', cls:'purple' },
    { label:'Câmeras Ativas', value:activeCams, sub:`${ativos.length>0?(mrrAtual/activeCams).toFixed(0):0} R$/câm`, chip:`${contratos.reduce((s,c)=>s+c.cameras,0)} total instaladas`, chipCls:'chip-gray' },
    { label:'Taxa de Coleta', value:taxaColeta+'%', sub:'Pagamentos confirmados ÷ esperados', chip:taxaColeta>=80?'Saudável':taxaColeta>=60?'Atenção':'Crítico', chipCls:taxaColeta>=80?'chip-up':taxaColeta>=60?'chip-warn':'chip-down', cls:taxaColeta>=80?'green':taxaColeta>=60?'amber':'red' },
    { label:'MRR em Risco 60d', value:fmt(mrrRisco), sub:`${vencendo60.length} contratos vencendo`, chip:vencendo60.length?'Renovar urgente':'Tudo OK', chipCls:vencendo60.length?'chip-warn':'chip-up', cls:vencendo60.length?'amber':'green' },
  ];
  document.getElementById('kpi-grid').innerHTML=kpis.map(k=>`
    <div class="kpi-card ${k.cls||''}">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${k.value}</div>
      <div class="kpi-sub">${k.sub}</div>
      <span class="kpi-chip ${k.chipCls}">${k.chip}</span>
    </div>`).join('');
}

  contratos.filter(c=>getMRRStatus(c)==='ativo').forEach(c=>{const share=c.mrr/(c.esportes.length||1);c.esportes.forEach(e=>{esportes[e]=(esportes[e]||0)+share;});});

  const estados={};
  contratos.filter(c=>getMRRStatus(c)==='ativo').forEach(c=>{estados[c.estado]=(estados[c.estado]||0)+c.mrr;});

  const mrrRisco60=contratos.filter(c=>{const d=diffDays(TODAY,parseDate(c.fim));return d>=0&&d<=60;}).reduce((s,c)=>s+c.mrr,0);
  if(mrrRisco60>0) obs.push(`<div class="obs"><strong>R$ ${mrrRisco60.toLocaleString('pt-BR')} em risco</strong> em contratos vencendo nos próximos 60 dias.</div>`);
  obs.push(`<div class="obs green"><strong>Top 3 clientes</strong> representam ${mrrTotal>0?Math.round((topAll.slice(0,3).reduce((s,c)=>s+c.mrr,0)/mrrTotal)*100):0}% do MRR — atenção à concentração.</div>`);
  obs.push(`<div class="obs green"><strong>${MESES_LABEL[Math.min(curMes+1,11)]} projetado: ${fmtK(calcMesEsperado(MESES_KEYS[Math.min(curMes+1,11)]))}</strong> com base nos contratos vigentes.</div>`);

  el.innerHTML=`
    <div class="grid-2" style="margin-bottom:16px">

          <td><strong>TOTAL (${contratos.length})</strong></td><td colspan="2"></td>

          <td class="text-center">${totalCams}</td>
          <td colspan="6"></td><td class="text-center">—</td>

// TAB: RECEBIMENTOS
// ═══════════════════════════════════════════
function buildRecebimentos(){
  const el=document.getElementById('recebimentos');
  const curMes=TODAY.getMonth();

  function cellHtml(v,mesIdx){
    const isPast=mesIdx<curMes,isCurrent=mesIdx===curMes;
    if(v===null||v===undefined) return`<span class="pay-vazio">—</span>`;
    if(typeof v==='number') return(isPast||isCurrent)?`<span class="pay-cell pay-pago">${fmt(v)}</span>`:`<span class="pay-cell pay-projetado">${fmt(v)}</span>`;
    if(v==='enviado') return`<span class="pay-cell pay-enviado">Enviado</span>`;
    if(v==='pendente') return`<span class="pay-cell pay-pendente">Pendente</span>`;
    return`<span class="pay-vazio">—</span>`;
  }

  const rows=contratos.map(c=>{
    const pagRow=PAG[c.clube]||{};
    const cells=MESES_KEYS.map((k,i)=>`<td class="text-center">${cellHtml(pagRow[k],i)}</td>`).join('');
    return`<tr><td class="fw-bold" style="white-space:nowrap">${c.clube}</td>${cells}</tr>`;
  }).join('');

  const totalRow=MESES_KEYS.map((k,i)=>{
    let t=0; contratos.forEach(c=>{const v=(PAG[c.clube]||{})[k];if(typeof v==='number')t+=v;else if(v==='enviado'||v==='pendente')t+=c.mrr;});
    const style=i<curMes?'color:#15803d':i===curMes?'color:#c2410c':'color:#6b7280';
    return`<td class="text-center font-mono" style="font-size:12px;${style}">${t>0?fmt(t):'—'}</td>`;
  }).join('');

  // Taxa de coleta por mês
  const taxaData=MESES_KEYS.slice(0,curMes).map(k=>{
    const conf=calcMesMRR(k),esp=calcMesEsperado(k);
    return esp>0?Math.round((conf/esp)*100):0;
  });

  const pastLbl=curMes>0?`${MESES_LABEL[0]}–${MESES_LABEL[curMes-1]}: confirmados · `:'';
  el.innerHTML=`
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">
        <div class="card-title-left">💰 Controle de Recebimentos 2026</div>
        <span class="card-sub">${pastLbl}${MESES_LABEL[curMes]}: atual${curMes<11?' · '+MESES_LABEL[curMes+1]+'–Dez: projetado':''}</span>
      </div>
      <div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px;font-size:12px">
        <span><span class="pay-cell pay-pago" style="display:inline-block;padding:2px 8px">R$ X</span> Pago</span>
        <span><span class="pay-cell pay-enviado" style="display:inline-block;padding:2px 8px">Enviado</span> Cobrança enviada</span>
        <span><span class="pay-cell pay-pendente" style="display:inline-block;padding:2px 8px">Pendente</span> Não pago</span>
        <span><span class="pay-cell pay-projetado" style="display:inline-block;padding:2px 8px">R$ X</span> Projetado</span>
        <span><span class="pay-vazio" style="display:inline-block">—</span> Fora do contrato</span>
      </div>
      <div class="table-wrap"><table>
        <thead><tr>
          <th style="min-width:160px">Clube</th>
          ${MESES_LABEL.map((m,i)=>`<th class="text-center" style="${i<curMes?'background:#f0fdf4':i===curMes?'background:#fff7ed':''};min-width:80px">${m}</th>`).join('')}
        </tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr class="total-row"><td><strong>TOTAL</strong></td>${totalRow}</tr></tfoot>
      </table></div>
    </div>
    ${taxaData.length>0?`<div class="card">
      <div class="card-title"><div class="card-title-left">📊 Taxa de Coleta por Mês</div><span class="card-sub">% dos pagamentos esperados que foram confirmados</span></div>
      <div class="chart-container" style="height:200px"><canvas id="chart-taxa-coleta"></canvas></div>
    </div>`:''}
  `;

  if(taxaData.length>0){
    setTimeout(()=>{
      new Chart(document.getElementById('chart-taxa-coleta'),{type:'bar',data:{
        labels:MESES_LABEL.slice(0,curMes),
        datasets:[{label:'Taxa de Coleta %',data:taxaData,backgroundColor:taxaData.map(v=>v>=80?'#22c55e':v>=60?'#f97316':'#ef4444'),borderRadius:8}]
      },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.raw}% coletado`}}},scales:{x:{grid:{display:false}},y:{min:0,max:100,grid:{color:'#f1f5f9'},ticks:{callback:v=>v+'%'}}}}});
    },50);
  }
}

// TAB: RENOVAÇÕES
// ═══════════════════════════════════════════
function buildRenovacoes(){
  const el=document.getElementById('renovacoes');
  const sorted=[...contratos].filter(c=>getMRRStatus(c)!=='futuro').sort((a,b)=>new Date(a.fim)-new Date(b.fim));
  function categorize(c){
    const days=diffDays(TODAY,parseDate(c.fim));
    if(days<0)   return{label:'VENCIDO',cls:'expired',dot:'dot-red',textCls:'#b91c1c'};
    if(days<=60) return{label:`Vence em ${days} dias`,cls:'urgent',dot:'dot-orange',textCls:'#c2410c'};
    if(days<=120)return{label:`Vence em ${days} dias`,cls:'watch',dot:'dot-yellow',textCls:'#92400e'};
    return{label:`${days} dias restantes`,cls:'ok',dot:'dot-green',textCls:'#15803d'};
  }
  const items=sorted.map(c=>{
    const cat=categorize(c);
    const fim=parseDate(c.fim).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
    return`<div class="renewal-item ${cat.cls}">
      <div class="dot ${cat.dot}"></div>
      <div class="renewal-info">
        <div class="renewal-clube">${c.clube}</div>
        <div class="renewal-meta">${esporteTags(c.esportes)} <span class="state-pill state-${c.estado}">${c.estado}</span> — ${c.contato} · ${c.tel}</div>
      </div>
      <div style="text-align:right">
        <div style="font-weight:700;font-size:14px">${fmt(c.mrr)}<span style="font-weight:400;color:#94a3b8;font-size:11px">/mês</span></div>
        <div style="font-size:12px;color:#64748b;margin-top:2px">Vence: ${fim}</div>
        <div style="font-size:12px;font-weight:700;color:${cat.textCls};margin-top:2px">${cat.label}</div>
      </div>
    </div>`;
  }).join('');

  const mrrVencido=contratos.filter(c=>getMRRStatus(c)==='vencido').reduce((s,c)=>s+c.mrr,0);
  const mrrUrgente=contratos.filter(c=>{const d=diffDays(TODAY,parseDate(c.fim));return d>=0&&d<=60;}).reduce((s,c)=>s+c.mrr,0);

  el.innerHTML=`
    <div class="grid-2" style="margin-bottom:16px">
      <div class="card" style="text-align:center">
        <div class="kpi-label">MRR com Renovação Vencida</div>
        <div class="kpi-value" style="color:#ef4444">${fmt(mrrVencido)}</div>
        <div class="kpi-sub">Renovação urgente necessária</div>
      </div>
      <div class="card" style="text-align:center">
        <div class="kpi-label">MRR Vencendo em 60 dias</div>
        <div class="kpi-value" style="color:#f97316">${fmt(mrrUrgente)}</div>
        <div class="kpi-sub">Iniciar processo de renovação agora</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title"><div class="card-title-left">🔄 Cronograma de Renovações</div></div>
      <div class="renewal-list">${items}</div>
    </div>`;
}

function buildProjecao(){
  const el=document.getElementById('projecao');
  const curMes=TODAY.getMonth();
  const mrrPorMes=MESES_KEYS.map((k,i)=>({mes:MESES_LABEL[i],key:k,confirmado:calcMesMRR(k),esperado:calcMesEsperado(k)}));

  const projecaoRows=mrrPorMes.map((m,i)=>{
    const prev=i>0?mrrPorMes[i-1].esperado:null;
    const delta=prev!==null?m.esperado-prev:null;
    const isConf=i<curMes,isCur=i===curMes;
    const rowStyle=isConf?'background:#f0fdf4':isCur?'background:#fff7ed':'';
    const deltaHtml=delta!==null?`<span style="font-size:11px;color:${delta>=0?'#15803d':'#b91c1c'}">${delta>=0?'+':''}${fmt(delta)}</span>`:'—';
    return`<tr style="${rowStyle}">
      <td class="fw-bold">${m.mes}</td>
      <td class="text-right font-mono">${isConf&&m.confirmado>0?fmt(m.confirmado):'—'}</td>
      <td class="text-right font-mono fw-bold">${fmt(m.esperado)}</td>

  const mrrAtual=calcMesEsperado(MESES_KEYS[curMes]);
  const mrrDez=calcMesEsperado('dez');
  const ativosLen=contratos.filter(c=>getMRRStatus(c)==='ativo').length;
  const ticketMedio=ativosLen>0?Math.round(mrrAtual/ativosLen):0;

  el.innerHTML=`
    <div class="card" style="margin-bottom:16px">
      <div class="card-title"><div class="card-title-left">📈 Projeção MRR 2026</div></div>
      <div class="chart-container" style="height:260px"><canvas id="chart-projecao"></canvas></div>
    </div>
    <div class="grid-2">
      <div class="card">
        <div class="card-title"><div class="card-title-left">📊 Tabela Mensal</div></div>
        <div class="table-wrap"><table>
          <thead><tr><th>Mês</th><th class="text-right">Confirmado</th><th class="text-right">Esperado</th><th class="text-right">Δ</th><th class="text-center">Status</th><th style="min-width:180px">Progresso</th></tr></thead>
          <tbody>${projecaoRows}</tbody>
        </table></div>
      </div>
      <div class="card">
        <div class="card-title"><div class="card-title-left">🎯 Metas 2026</div></div>
        <div class="obs-list">
          <div class="obs green"><strong>Meta 1S/2026: R$ 10.400</strong> — atual: ${fmt(mrrAtual)}
            <div class="prog-bar" style="margin-top:8px"><div class="prog-fill green" style="width:${Math.min(100,(mrrAtual/10400)*100).toFixed(0)}%"></div></div>
            <div style="font-size:11px;margin-top:4px">${((mrrAtual/10400)*100).toFixed(0)}% da meta</div>
          </div>
          <div class="obs"><strong>Meta Anual 2026: R$ 25.000</strong> — projetado Dez: ${fmt(mrrDez)}
            <div class="prog-bar" style="margin-top:8px"><div class="prog-fill" style="width:${Math.min(100,(mrrDez/25000)*100).toFixed(0)}%"></div></div>
            <div style="font-size:11px;margin-top:4px">${((mrrDez/25000)*100).toFixed(0)}% da meta anual</div>
          </div>
          <div class="obs gray"><strong>Ticket médio:</strong> ${fmt(ticketMedio)} | <strong>Meta:</strong> R$ 450 | <strong>Gap:</strong> ${ticketMedio<450?'+R$ '+(450-ticketMedio).toLocaleString('pt-BR')+'/cliente':'Meta atingida ✓'}</div>
          <div class="obs gray">Necessário <strong>4 novos clientes/mês</strong> para atingir meta anual.</div>
        </div>
      </div>
    </div>`;

  setTimeout(()=>{
    new Chart(document.getElementById('chart-projecao'),{type:'line',data:{
      labels:MESES_LABEL,
      datasets:[
        {label:'MRR Confirmado',data:MESES_KEYS.map((k,i)=>i<curMes?calcMesMRR(k):null),borderColor:'#22c55e',backgroundColor:'rgba(34,197,94,.1)',borderWidth:3,pointRadius:5,fill:true,tension:0.3},
        {label:'MRR Esperado/Projetado',data:MESES_KEYS.map(k=>calcMesEsperado(k)),borderColor:'#f97316',backgroundColor:'rgba(249,115,22,.05)',borderWidth:2,borderDash:[5,3],pointRadius:4,fill:true,tension:0.3},
        {label:'Meta',data:[5000,6800,8600,10400,12200,14000,15800,17600,19400,21200,23000,25000],borderColor:'#0f172a',borderWidth:1.5,borderDash:[3,3],pointRadius:0,fill:false},
      ]
    },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11}}},tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: R$ ${ctx.raw?.toLocaleString('pt-BR')||'—'}`}}},scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{grid:{color:'#f1f5f9'},ticks:{font:{size:11},callback:v=>'R$'+(v/1000).toFixed(0)+'k'}}}}});

}

// TAB: ESTOQUE
// ═══════════════════════════════════════════
function buildEstoque(){
  const el=document.getElementById('estoque');
  if(!estoque.length){el.innerHTML='<div class="card" style="text-align:center;padding:40px;color:#94a3b8">Nenhum dado de estoque encontrado.</div>';return;}

  // Agrupar por categoria
  const cats={};
  estoque.forEach(e=>{cats[e.categoria]=(cats[e.categoria]||0)+e.qtde;});
  const totalItens=estoque.reduce((s,e)=>s+e.qtde,0);
  const totalTipos=estoque.length;
  const totalCats=Object.keys(cats).length;
  const alertas=estoque.filter(e=>e.qtde<=2);
  const criticos=estoque.filter(e=>e.qtde===1);

  function estoqueStatus(qtde){
    if(qtde===1) return'<span class="badge badge-critico">🔴 Crítico</span>';
    if(qtde<=3)  return'<span class="badge badge-baixo">🟠 Baixo</span>';
    return'<span class="badge badge-ok">✓ OK</span>';
  }

  const tableRows=[...estoque].sort((a,b)=>a.qtde-b.qtde).map(e=>`
    <tr class="${e.qtde===1?'expired-row':e.qtde<=3?'anomaly':''}">
      <td class="fw-bold">${e.item}</td>
      <td><span class="kpi-chip chip-gray" style="font-size:11px">${e.categoria}</span></td>
      <td class="text-center fw-bold" style="font-size:16px;color:${e.qtde===1?'#ef4444':e.qtde<=3?'#f97316':'#22c55e'}">${e.qtde}</td>
      <td>${estoqueStatus(e.qtde)}</td>
    </tr>`).join('');

  el.innerHTML=`
    <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px">
      <div class="kpi-card"><div class="kpi-label">Total em Estoque</div><div class="kpi-value">${totalItens}</div><div class="kpi-sub">unidades disponíveis</div></div>
      <div class="kpi-card"><div class="kpi-label">Tipos de Item</div><div class="kpi-value">${totalTipos}</div><div class="kpi-sub">itens diferentes</div></div>
      <div class="kpi-card"><div class="kpi-label">Categorias</div><div class="kpi-value">${totalCats}</div><div class="kpi-sub">${Object.keys(cats).join(', ')}</div></div>
      <div class="kpi-card ${alertas.length?'red':'green'}"><div class="kpi-label">Alertas de Estoque</div><div class="kpi-value" style="color:${alertas.length?'#ef4444':'#22c55e'}">${alertas.length}</div><div class="kpi-sub">${criticos.length} crítico(s) · ${alertas.length-criticos.length} baixo(s)</div></div>
    </div>
    <div class="grid-2" style="margin-bottom:16px">
      <div class="card">
        <div class="card-title"><div class="card-title-left">📦 Estoque por Categoria</div></div>
        <div class="chart-container" style="height:260px"><canvas id="chart-estoque-cat"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title"><div class="card-title-left">📊 Quantidade por Item</div><span class="card-sub">Ordenado por quantidade (menor = mais urgente)</span></div>
        <div class="chart-container" style="height:260px"><canvas id="chart-estoque-itens"></canvas></div>
      </div>
    </div>
    ${alertas.length?`<div class="card" style="border:2px solid #fed7aa;margin-bottom:16px">
      <div class="card-title" style="color:#c2410c"><div class="card-title-left">⚠️ Itens com Estoque Crítico ou Baixo</div></div>
      <div class="obs-list">
        ${criticos.map(e=>`<div class="obs danger"><strong>${e.item}</strong> (${e.categoria}) — apenas <strong>${e.qtde} unidade</strong>. Reabastecer com urgência!</div>`).join('')}
        ${alertas.filter(e=>e.qtde>1).map(e=>`<div class="obs"><strong>${e.item}</strong> (${e.categoria}) — ${e.qtde} unidades restantes.</div>`).join('')}
      </div>
    </div>`:''}
    <div class="card">
      <div class="card-title"><div class="card-title-left">📋 Inventário Completo</div></div>
      <div class="table-wrap"><table>
        <thead><tr><th>Item</th><th>Categoria</th><th class="text-center">Qtde</th><th>Status</th></tr></thead>
        <tbody>${tableRows}</tbody>
        <tfoot><tr class="total-row"><td><strong>TOTAL</strong></td><td></td><td class="text-center">${totalItens}</td><td></td></tr></tfoot>
      </table></div>
    </div>`;

  setTimeout(()=>{
    const catKeys=Object.keys(cats), catVals=Object.values(cats);
    const catColors=['#f97316','#ea580c','#fbbf24','#0f172a','#1e293b','#fed7aa'];
    new Chart(document.getElementById('chart-estoque-cat'),{type:'doughnut',data:{
      labels:catKeys,datasets:[{data:catVals,backgroundColor:catColors.slice(0,catKeys.length),borderWidth:2,borderColor:'#fff'}]
    },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11},padding:10}},tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${ctx.raw} unidades`}}}}});

    const sortedItems=[...estoque].sort((a,b)=>a.qtde-b.qtde);
    new Chart(document.getElementById('chart-estoque-itens'),{type:'bar',data:{
      labels:sortedItems.map(e=>e.item),
      datasets:[{label:'Qtde',data:sortedItems.map(e=>e.qtde),backgroundColor:sortedItems.map(e=>e.qtde===1?'#ef4444':e.qtde<=3?'#f97316':'#22c55e'),borderRadius:6}]
    },options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'#f1f5f9'},ticks:{stepSize:1}},y:{grid:{display:false},ticks:{font:{size:10}}}}}});
  },50);
}

// TAB: IMPLANTAÇÃO
// ═══════════════════════════════════════════
function buildImplantacao(){
  const el = document.getElementById('implantacao');

  // KPIs from resumo
  const totalCobrado = implResumo.reduce((s,r)=>s+r.cobrado,0);
  const totalGasto   = implResumo.reduce((s,r)=>s+r.gasto,0);
  const totalROI     = totalCobrado - totalGasto;
  const margem       = totalCobrado > 0 ? Math.round((totalROI/totalCobrado)*100) : 0;

  // Já recebido vs a receber (from parcelas)
  const curMesIdx  = TODAY.getMonth(); // 0-based
  const MES_IDX    = {jan:0,fev:1,mar:2,abr:3,mai:4,jun:5,jul:6,ago:7,set:8,out:9,nov:10,dez:11};
  const jaRecebido = implParcelas.filter(p => (MES_IDX[p.mes]||0) <= curMesIdx).reduce((s,p)=>s+p.valor,0);
  const aReceber   = implParcelas.filter(p => (MES_IDX[p.mes]||0) >  curMesIdx).reduce((s,p)=>s+p.valor,0);
  const totalParcelas = implParcelas.reduce((s,p)=>s+p.valor,0);

  // Months that have parcela entries
  const MES_ORDER = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  const MES_LABEL_MAP = {jan:'Jan',fev:'Fev',mar:'Mar',abr:'Abr',mai:'Mai',jun:'Jun',jul:'Jul',ago:'Ago',set:'Set',out:'Out',nov:'Nov',dez:'Dez'};
  const mesesAtivos = MES_ORDER.filter(m => implParcelas.some(p => p.mes === m));

  // Clubs with parcelas
  const clubesParcelas = [...new Set(implParcelas.map(p => p.clube))];

  // Build parcelas grid per clube per mes
  function getCelula(clube, mes) {
    const entry = implParcelas.find(p => p.clube === clube && p.mes === mes);
    if (!entry) return '<span class="pay-vazio">—</span>';
    const parcelaLabel = entry.parcela ? `<span style="font-size:10px;color:#94a3b8;display:block">${entry.parcela}</span>` : '';
    return `<span class="pay-cell pay-pago">${fmt(entry.valor)}${parcelaLabel}</span>`;
  }

  // Resumo table rows
  const resumoRows = implResumo.map(r => {
    const roi = r.cobrado - r.gasto;
    const mg  = r.cobrado > 0 ? Math.round((roi/r.cobrado)*100) : 0;
    const gastoCell = r.gasto > 0 ? fmt(r.gasto) : '<span style="color:#94a3b8">—</span>';
    const mgCls = mg >= 0 ? 'chip-up' : 'chip-down';
    return `<tr>
      <td class="fw-bold">${r.clube}</td>
      <td class="text-right fw-bold font-mono" style="color:#0f172a">${fmt(r.cobrado)}</td>
      <td class="text-right font-mono">${gastoCell}</td>
      <td class="text-right fw-bold font-mono" style="color:${roi>=0?'#15803d':'#b91c1c'}">${fmt(roi)}</td>
      <td class="text-center"><span class="kpi-chip ${mgCls}">${mg}%</span></td>
    </tr>`;
  }).join('');

  // Parcelas table rows
  const parcelasRows = clubesParcelas.map(clube => {
    const totalClube = implParcelas.filter(p=>p.clube===clube).reduce((s,p)=>s+p.valor,0);
    const cells = mesesAtivos.map(m => `<td class="text-center">${getCelula(clube,m)}</td>`).join('');
    return `<tr>
      <td class="fw-bold">${clube}</td>
      ${cells}
      <td class="text-right fw-bold font-mono" style="color:#f97316">${fmt(totalClube)}</td>
    </tr>`;
  }).join('');

  const totalPorMes = mesesAtivos.map(m => {
    const t = implParcelas.filter(p=>p.mes===m).reduce((s,p)=>s+p.valor,0);
    return `<td class="text-right fw-bold font-mono">${t>0?fmt(t):'—'}</td>`;
  }).join('');

  el.innerHTML = `
    <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:12px">
      <div class="kpi-card green">
        <div class="kpi-label">Já Recebido (parcelas)</div>
        <div class="kpi-value" style="color:#15803d">${fmtK(jaRecebido)}</div>
        <div class="kpi-sub">Parcelas até ${MESES_LABEL[curMesIdx]}</div>
        <span class="kpi-chip chip-up">${totalParcelas>0?Math.round((jaRecebido/totalParcelas)*100):0}% do total parcelado</span>
      </div>
      <div class="kpi-card amber">
        <div class="kpi-label">A Receber (parcelas)</div>
        <div class="kpi-value" style="color:#c2410c">${fmtK(aReceber)}</div>
        <div class="kpi-sub">Parcelas futuras pendentes</div>
        <span class="kpi-chip chip-warn">${totalParcelas>0?Math.round((aReceber/totalParcelas)*100):0}% do total parcelado</span>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Total Parcelado</div>
        <div class="kpi-value">${fmtK(totalParcelas)}</div>
        <div class="kpi-sub">${[...new Set(implParcelas.map(p=>p.clube))].length} cliente(s) com parcelas</div>
        <span class="kpi-chip chip-gray">${implParcelas.length} parcelas no total</span>
      </div>
    </div>
    <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:20px">
      <div class="kpi-card">
        <div class="kpi-label">Total Cobrado (setup)</div>
        <div class="kpi-value">${fmtK(totalCobrado)}</div>
        <div class="kpi-sub">${implResumo.length} clientes</div>
      </div>
      <div class="kpi-card ${totalGasto>0?'amber':'green'}">
        <div class="kpi-label">Total Gasto (setup)</div>
        <div class="kpi-value">${totalGasto>0?fmtK(totalGasto):'—'}</div>
        <div class="kpi-sub">Custo de instalação</div>
      </div>
      <div class="kpi-card ${totalROI>=0?'green':'red'}">
        <div class="kpi-label">Saldo · Margem</div>
        <div class="kpi-value" style="color:${totalROI>=0?'#15803d':'#b91c1c'}">${fmtK(totalROI)}</div>
        <div class="kpi-sub">Cobrado − Gasto</div>
        <span class="kpi-chip ${margem>=0?'chip-up':'chip-down'}">${margem}% margem</span>
      </div>
    </div>

    <div class="grid-2" style="margin-bottom:16px">
      <div class="card">
        <div class="card-title"><div class="card-title-left">💰 Cobrado vs Gasto por Cliente</div></div>
        <div class="chart-container" style="height:240px"><canvas id="chart-impl-barras"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title"><div class="card-title-left">📋 Resumo por Cliente</div><span class="card-sub">Cobrado · Gasto · Saldo · Margem</span></div>
        <div class="table-wrap"><table>
          <thead><tr>
            <th>Cliente</th>
            <th class="text-right">Cobrado</th>
            <th class="text-right">Gasto</th>
            <th class="text-right">Saldo</th>
            <th class="text-center">Margem</th>
          </tr></thead>
          <tbody>${resumoRows}</tbody>
          <tfoot><tr class="total-row">
            <td><strong>TOTAL</strong></td>
            <td class="text-right fw-bold font-mono">${fmt(totalCobrado)}</td>
            <td class="text-right fw-bold font-mono">${totalGasto>0?fmt(totalGasto):'—'}</td>
            <td class="text-right fw-bold font-mono" style="color:${totalROI>=0?'#15803d':'#b91c1c'}">${fmt(totalROI)}</td>
            <td class="text-center"><span class="kpi-chip ${margem>=0?'chip-up':'chip-down'}">${margem}%</span></td>
          </tr></tfoot>
        </table></div>
      </div>
    </div>

    ${mesesAtivos.length > 0 ? `
    <div class="card">
      <div class="card-title"><div class="card-title-left">📅 Cronograma de Recebimento de Parcelas</div><span class="card-sub">Taxas de implantação parceladas</span></div>
      <div class="table-wrap"><table>
        <thead><tr>
          <th>Cliente</th>
          ${mesesAtivos.map(m=>`<th class="text-center">${MES_LABEL_MAP[m]}</th>`).join('')}
          <th class="text-right">Total</th>
        </tr></thead>
        <tbody>${parcelasRows}</tbody>
        <tfoot><tr class="total-row">
          <td><strong>TOTAL/MÊS</strong></td>
          ${totalPorMes}
          <td class="text-right fw-bold font-mono">${fmt(implParcelas.reduce((s,p)=>s+p.valor,0))}</td>
        </tr></tfoot>
      </table></div>
    </div>` : `<div class="card"><div class="obs gray">Nenhum dado de parcelas encontrado ainda.</div></div>`}

    ${implResumo.length === 0 && implParcelas.length === 0 ? `
    <div class="card" style="text-align:center;padding:40px">
      <div style="font-size:32px;margin-bottom:12px">🔧</div>
      <div style="font-weight:700;color:#0f172a">Sem dados de implantação</div>
      <div style="font-size:12px;color:#64748b;margin-top:6px">Preencha as abas da planilha para visualizar aqui.</div>
    </div>` : ''}
  `;

  setTimeout(()=>{
    const chartEl = document.getElementById('chart-impl-barras');
    if (!chartEl || implResumo.length === 0) return;
    const labels = implResumo.map(r => r.clube.split(' ')[0]);
    new Chart(chartEl, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: 'Cobrado',  data: implResumo.map(r=>r.cobrado), backgroundColor: '#f97316', borderRadius: 6 },
          { label: 'Gasto',    data: implResumo.map(r=>r.gasto),   backgroundColor: '#ef4444', borderRadius: 6 },
          { label: 'Saldo',    data: implResumo.map(r=>r.cobrado-r.gasto), backgroundColor: '#22c55e', borderRadius: 6 },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'bottom', labels: { font: { size: 11 } } },
          tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: R$ ${ctx.raw.toLocaleString('pt-BR')}` } }
        },
        scales: {
          x: { grid: { display: false }, ticks: { font: { size: 12 } } },
          y: { grid: { color: '#f1f5f9' }, ticks: { callback: v => 'R$'+(v/1000).toFixed(1)+'k', font: { size: 11 } } }
        }
      }
    });
  }, 50);
}


// ═══════════════════════════════════════════
// CLIENTE vs PRODUTO PARSER
// ═══════════════════════════════════════════
function buildClienteProdutoFromCSV(text) {
  // Parse raw CSV by position using the TOTAL formula columns already in the sheet
  // Col indices: 0=Clube 1=Replay(bool) 2=pcReplay 3=totalReplay 4=Trans(bool) 5=pcTrans 6=totalTrans
  //              7=Placar(bool) 8=pcPlacar 9=totalPlacar 10=Comanda(bool) 11=pcComanda 12=totalComanda
  //              13=Professores(bool) 14=totalProfessores 15=cameras 16=totalGeral
  // Note: Comanda and Professores are flat per club (not per camera)
  text = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const lines = text.trim().split('\n').filter(l=>l.trim());
  let dataStart = 0;
  for(let i=0;i<lines.length;i++){
    const cols0 = (parseCSVLine(lines[i])[0]||'').trim().toLowerCase();
    if(cols0==='clube'){ dataStart=i+1; break; }
  }
  console.log('[CP] dataStart='+dataStart+' sample line:', lines[dataStart]);
  const isBool = v => (v||'').toString().toUpperCase()==='TRUE';
  const data = [];
  for(let i=dataStart;i<lines.length;i++){
    const cols = parseCSVLine(lines[i]);
    const clube = (cols[0]||'').trim();
    if(!clube || clube.toLowerCase().includes('média') || clube.toLowerCase().includes('media') || clube.toLowerCase().includes('total')) continue;
    const cameras = parseInt(cols[15]||'0')||0;
    const pcReplay  = parseMoney(cols[2]||'');
    const pcTrans   = parseMoney(cols[5]||'');
    const pcPlacar  = parseMoney(cols[8]||'');
    // Use total columns (formulas already calculate price × cameras)
    const valorReplay      = parseMoney(cols[3]||'')  || pcReplay  * cameras;
    const valorTransmissao = parseMoney(cols[6]||'')  || pcTrans   * cameras;
    const valorPlacar      = parseMoney(cols[9]||'')  || pcPlacar  * cameras;
    const valorComanda     = parseMoney(cols[12]||''); // flat per club
    const valorProfessores = parseMoney(cols[14]||''); // flat per club
    data.push({
      clube, cameras, pcReplay, pcTrans, pcPlacar,
      replay:      isBool(cols[1])  || valorReplay>0,
      transmissao: isBool(cols[4])  || valorTransmissao>0,
      placar:      isBool(cols[7])  || valorPlacar>0,
      comanda:     isBool(cols[10]) || valorComanda>0,
      professores: isBool(cols[13]) || valorProfessores>0,
      valorReplay, valorTransmissao, valorPlacar, valorComanda, valorProfessores,
    });
  }
  console.log('[CP] parsed', data.length, 'clientes, sample:', JSON.stringify(data[0]));
  return data;
}

// BUILD CLIENTE vs PRODUTO
// ═══════════════════════════════════════════
function buildClienteProduto() {
  const el = document.getElementById('cliente-produto');
  if(!clienteProduto.length){ el.innerHTML='<div class="card" style="padding:32px;text-align:center;color:#94a3b8">Nenhum dado encontrado na planilha.</div>'; return; }

  const totalCams = clienteProduto.reduce((s,c)=>s+c.cameras,0);

  // Totais por serviço
  const totReplay  = clienteProduto.filter(c=>c.replay).reduce((s,c)=>s+c.valorReplay,0);
  const totTrans   = clienteProduto.filter(c=>c.transmissao).reduce((s,c)=>s+c.valorTransmissao,0);
  const totPlacar  = clienteProduto.filter(c=>c.placar).reduce((s,c)=>s+c.valorPlacar,0);
  const totComanda = clienteProduto.filter(c=>c.comanda).reduce((s,c)=>s+c.valorComanda,0);
  const totProf    = clienteProduto.filter(c=>c.professores).reduce((s,c)=>s+c.valorProfessores,0);
  const totGeral   = totReplay+totTrans+totPlacar+totComanda+totProf;

  // Câmeras por serviço (para ticket médio)
  const camReplay  = clienteProduto.filter(c=>c.replay).reduce((s,c)=>s+c.cameras,0);
  const camTrans   = clienteProduto.filter(c=>c.transmissao).reduce((s,c)=>s+c.cameras,0);
  const camPlacar  = clienteProduto.filter(c=>c.placar).reduce((s,c)=>s+c.cameras,0);
  const camComanda = clienteProduto.filter(c=>c.comanda).reduce((s,c)=>s+c.cameras,0);
  const camProf    = clienteProduto.filter(c=>c.professores).reduce((s,c)=>s+c.cameras,0);

  // Ticket médio = total serviço / cameras dos clientes com aquele serviço
  const tmReplay  = camReplay  > 0 ? totReplay/camReplay   : 0;
  const tmTrans   = camTrans   > 0 ? totTrans/camTrans      : 0;
  const tmPlacar  = camPlacar  > 0 ? totPlacar/camPlacar   : 0;
  const tmComanda = camComanda > 0 ? totComanda/camComanda : 0;
  const tmProf    = camProf    > 0 ? totProf/camProf       : 0;

  const nReplay  = clienteProduto.filter(c=>c.replay).length;
  const nTrans   = clienteProduto.filter(c=>c.transmissao).length;
  const nPlacar  = clienteProduto.filter(c=>c.placar).length;
  const nComanda = clienteProduto.filter(c=>c.comanda).length;
  const nProf    = clienteProduto.filter(c=>c.professores).length;
  const total    = clienteProduto.length;

  const svcColors = ['#f97316','#ea580c','#fbbf24','#0ea5e9','#a855f7'];
  const svcLabels = ['Replay','Transmissão','Placar','G. Comanda','G. Professores'];
  const svcTotais = [totReplay,totTrans,totPlacar,totComanda,totProf];
  const svcCounts = [nReplay,nTrans,nPlacar,nComanda,nProf];
  const svcTM     = [tmReplay,tmTrans,tmPlacar,tmComanda,tmProf];

  // Alocação ponderada (regras da planilha)
  // replay+trans = 80% replay + 20% trans
  // replay+trans+placar = 50% replay + 20% trans + 30% placar
  let wReplay=0, wTrans=0, wPlacar=0;
  clienteProduto.forEach(c => {
    const tot = c.valorReplay + c.valorTransmissao + c.valorPlacar + c.valorComanda + c.valorProfessores;
    if(c.replay && c.transmissao && c.placar) {
      wReplay += tot * 0.50;
      wTrans  += tot * 0.20;
      wPlacar += tot * 0.30;
    } else if(c.replay && c.transmissao) {
      wReplay += tot * 0.80;
      wTrans  += tot * 0.20;
    } else {
      // fallback: proporcional ao valor real
      wReplay += c.valorReplay;
      wTrans  += c.valorTransmissao;
      wPlacar += c.valorPlacar;
    }
  });
  const wTmReplay = totalCams>0 ? wReplay/totalCams : 0;
  const wTmTrans  = totalCams>0 ? wTrans/totalCams  : 0;
  const wTmPlacar = camPlacar>0 ? wPlacar/camPlacar : 0;

  // Rows
  const clienteRows = clienteProduto.map(c => {
    const tags = [];
    if(c.replay)      tags.push(`<span class="tag tag-areia">Replay</span>`);
    if(c.transmissao) tags.push(`<span class="tag tag-padel">Transmissão</span>`);
    if(c.placar)      tags.push(`<span class="tag tag-society">Placar</span>`);
    if(c.comanda)     tags.push(`<span class="tag" style="background:#e0f2fe;color:#0369a1">Comanda</span>`);
    if(c.professores) tags.push(`<span class="tag" style="background:#f3e8ff;color:#7c3aed">Professores</span>`);
    const totalCliente = c.valorReplay+c.valorTransmissao+c.valorPlacar+c.valorComanda+c.valorProfessores;
    return `<tr>
      <td class="fw-bold">${c.clube}</td>
      <td class="text-center">${c.cameras}</td>
      <td class="text-right font-mono">${c.valorReplay>0?fmt(c.valorReplay):'—'}<br><span style="color:#94a3b8;font-size:11px">${c.pcReplay>0?fmt(c.pcReplay)+'/câm':''}</span></td>
      <td class="text-right font-mono">${c.valorTransmissao>0?fmt(c.valorTransmissao):'—'}<br><span style="color:#94a3b8;font-size:11px">${c.pcTrans>0?fmt(c.pcTrans)+'/câm':''}</span></td>
      <td class="text-right font-mono">${c.valorPlacar>0?fmt(c.valorPlacar):'—'}<br><span style="color:#94a3b8;font-size:11px">${c.pcPlacar>0?fmt(c.pcPlacar)+'/câm':''}</span></td>
      <td class="text-right font-mono">${c.valorComanda>0?fmt(c.valorComanda):'—'}</td>
      <td class="text-right font-mono">${c.valorProfessores>0?fmt(c.valorProfessores):'—'}</td>
      <td class="text-right fw-bold font-mono" style="color:#f97316">${fmt(totalCliente)}</td>
    </tr>`;
  }).join('');

  el.innerHTML = `
    <div class="kpi-grid" style="margin-bottom:16px">
      <div class="kpi-card green">
        <div class="kpi-label">Total MRR Serviços</div>
        <div class="kpi-value">${fmtK(totGeral)}</div>
        <div class="kpi-sub">${totalCams} câmeras · ${total} clientes</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Replay</div>
        <div class="kpi-value">${fmtK(totReplay)}</div>
        <div class="kpi-sub">${nReplay} clientes · <strong>${fmt(tmReplay)}/câm</strong> ticket médio</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Transmissão</div>
        <div class="kpi-value">${fmtK(totTrans)}</div>
        <div class="kpi-sub">${nTrans} clientes · <strong>${fmt(tmTrans)}/câm</strong> ticket médio</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Placar</div>
        <div class="kpi-value">${totPlacar>0?fmtK(totPlacar):'—'}</div>
        <div class="kpi-sub">${nPlacar} cliente${nPlacar!==1?'s':''} · ${tmPlacar>0?'<strong>'+fmt(tmPlacar)+'</strong>/câm ticket médio':'sem dados'}</div>
      </div>
      ${totComanda>0||nComanda>0?`<div class="kpi-card">
        <div class="kpi-label">G. Comanda</div>
        <div class="kpi-value">${totComanda>0?fmtK(totComanda):'—'}</div>
        <div class="kpi-sub">${nComanda} cliente${nComanda!==1?'s':''}</div>
      </div>`:''}
      ${totProf>0||nProf>0?`<div class="kpi-card">
        <div class="kpi-label">G. Professores</div>
        <div class="kpi-value">${totProf>0?fmtK(totProf):'—'}</div>
        <div class="kpi-sub">${nProf} cliente${nProf!==1?'s':''}</div>
      </div>`:''}
    </div>

    <div class="grid-2" style="margin-bottom:16px">
      <div class="card">
        <div class="card-title"><div class="card-title-left">💰 Receita Total por Serviço</div><span class="card-sub">R$ total</span></div>
        <div class="chart-container" style="height:200px"><canvas id="chart-svc-total"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title"><div class="card-title-left">📊 Ticket Médio por Câmera</div><span class="card-sub">Total serviço ÷ câmeras dos clientes com o serviço</span></div>
        <div class="chart-container" style="height:200px"><canvas id="chart-svc-tm"></canvas></div>
      </div>
    </div>

    <div class="card" style="margin-bottom:16px">
      <div class="card-title">
        <div class="card-title-left">⚖️ Alocação Ponderada de Receita</div>
        <span class="card-sub">80% Replay · 20% Trans · ou 50/20/30 com Placar</span>
      </div>
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-label">Replay (ponderado)</div>
          <div class="kpi-value">${fmtK(wReplay)}</div>
          <div class="kpi-sub"><strong>${fmt(wTmReplay)}/câm</strong> ticket médio · ${totalCams} câmeras</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Transmissão (ponderada)</div>
          <div class="kpi-value">${fmtK(wTrans)}</div>
          <div class="kpi-sub"><strong>${fmt(wTmTrans)}/câm</strong> ticket médio · ${totalCams} câmeras</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Placar (ponderado)</div>
          <div class="kpi-value">${wPlacar>0?fmtK(wPlacar):'—'}</div>
          <div class="kpi-sub">${wTmPlacar>0?'<strong>'+fmt(wTmPlacar)+'</strong>/câm ticket médio · '+camPlacar+' câmeras':'apenas clientes com Placar'}</div>
        </div>
      </div>
      <div class="chart-container" style="height:180px;margin-top:12px"><canvas id="chart-ponderado"></canvas></div>
    </div>

    <div class="card">
      <div class="card-title">

      </div>
      <div class="table-wrap"><table>

          <th class="text-right">Total</th>
        </tr></thead>
        <tbody>${clienteRows}</tbody>
        <tfoot><tr class="total-row">
          <td><strong>TOTAL</strong></td>
          <td class="text-center fw-bold">${totalCams}</td>
          <td class="text-right fw-bold font-mono" style="color:#f97316">${fmt(totReplay)}<br><span style="color:#94a3b8;font-size:11px">${fmt(tmReplay)}/câm</span></td>
          <td class="text-right fw-bold font-mono" style="color:#f97316">${fmt(totTrans)}<br><span style="color:#94a3b8;font-size:11px">${fmt(tmTrans)}/câm</span></td>
          <td class="text-right fw-bold font-mono" style="color:#f97316">${totPlacar>0?fmt(totPlacar):'—'}${tmPlacar>0?'<br><span style="color:#94a3b8;font-size:11px">'+fmt(tmPlacar)+'/câm</span>':''}</td>

  setTimeout(()=>{
    new Chart(document.getElementById('chart-svc-total'),{type:'bar',data:{

// PIPELINE ONBOARDING
// ═══════════════════════════════════════════
const PIPELINE_ETAPAS = [
  { key: 'Contato Inicial',            alt: 'Contanto Inicial',          label: 'Contato\nInicial' },
  { key: 'Infra Analisada',            alt: 'Infraestrutura Analisada',  label: 'Infra\nAnalisada' },
  { key: 'Contrato Assinado',          alt: '',                          label: 'Contrato\nAssinado' },
  { key: 'Compra Produtos',            alt: '',                          label: 'Compra\nProdutos' },
  { key: 'Chegada Produtos',           alt: '',                          label: 'Produtos\nChegaram' },
  { key: 'Finalização Configuração',   alt: 'Finalizacao Configuracao',  label: 'Config.\nFinalizada' },
  { key: 'Instalação Cliente',         alt: 'Instalacao Cliente',        label: 'Instalação\nCliente' },
];

function getColVal(row, etapa) {
  const v = row[etapa.key] || row[etapa.alt] || '';
  return v.toUpperCase() === 'TRUE';
}

function buildPipelineFromCSV(rows) {
  return rows.filter(r => r['Cliente'] && r['Cliente'].trim()).map(r => ({
    cliente: r['Cliente'].trim(),
    etapas: PIPELINE_ETAPAS.map(e => ({ label: e.label, done: getColVal(r, e) }))
  }));
}

function buildPipeline() {
  const el = document.getElementById('pipeline');
  if (!pipeline.length) {
    el.innerHTML = `<div style="text-align:center;padding:60px 20px;color:#64748b;font-size:14px">
      Nenhum cliente em onboarding no momento.<br>
      <span style="font-size:12px">Adicione clientes na aba <strong>Pipeline</strong> da planilha.</span>
    </div>`;
    return;
  }

  let html = `<div class="section-title">🚀 Pipeline de Onboarding</div><div class="pipeline-grid">`;

  pipeline.forEach(c => {
    const totalEtapas = c.etapas.length;
    const doneCnt = c.etapas.filter(e => e.done).length;
    const allDone = doneCnt === totalEtapas;
    const pct = Math.round((doneCnt / totalEtapas) * 100);

    // find current step (first not done)
    const currentIdx = c.etapas.findIndex(e => !e.done);

    const badge = allDone
      ? `<span class="pipeline-badge done">✓ Concluído</span>`
      : `<span class="pipeline-badge ongoing">${doneCnt}/${totalEtapas} etapas</span>`;

    html += `<div class="pipeline-card">
      <div class="pipeline-card-header">
        <div class="pipeline-card-name">${c.cliente}</div>
        <div style="display:flex;align-items:center;gap:12px">
          <div style="font-size:11px;color:#94a3b8;font-weight:600">${pct}%</div>
          ${badge}
        </div>
      </div>
      <div class="pipeline-steps">`;

    c.etapas.forEach((etapa, i) => {
      const isCurrent = !allDone && i === currentIdx;
      const cls = etapa.done ? 'done' : isCurrent ? 'current' : 'pending';
      const icon = etapa.done ? '✓' : isCurrent ? '●' : `${i+1}`;
      const connCls = etapa.done && i < totalEtapas - 1 ? 'step-done' : '';
      html += `<div class="pipeline-step ${connCls}">
        <div class="pipeline-dot ${cls}">${icon}</div>
        <div class="pipeline-label ${cls}">${etapa.label.replace('\n','<br>')}</div>
      </div>`;
    });

    html += `</div></div>`;
  });

  html += `</div>`;
  el.innerHTML = html;
}

// TAB SWITCHER
// ═══════════════════════════════════════════
let builtTabs={};
const TAB_IDS=['visao-geral','contratos','recebimentos','renovacoes','projecao','estoque','implantacao','cliente-produto','pipeline'];

function switchTab(id){
  document.querySelectorAll('.nav-item').forEach((b,i)=>b.classList.toggle('active',TAB_IDS[i]===id));
  const hideKPI=['recebimentos','renovacoes','projecao','estoque','implantacao','cliente-produto'];
  document.getElementById('kpi-grid').style.display=hideKPI.includes(id)?'none':'';
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(window.innerWidth<=768) closeSidebar();
  if(!builtTabs[id]){
    builtTabs[id]=true;
    if(id==='visao-geral')  buildVisaoGeral();
    if(id==='contratos')    buildContratos();
    if(id==='recebimentos') buildRecebimentos();
    if(id==='renovacoes')   buildRenovacoes();
    if(id==='projecao')     buildProjecao();
    if(id==='estoque')      buildEstoque();
    if(id==='implantacao')  buildImplantacao();
    if(id==='cliente-produto') buildClienteProduto();
    if(id==='pipeline')        buildPipeline();
  }
}
